<html>
    <head>

    </head>
    <body>
        <h1>Array</h1>
        <script>
            let fruit =[
                {name:"ส้มโอ", qty: 5, price:80},
                {name:"มะม่วง", qty: 3, price:50}
            ];
            let price=[80,50,159,60,20];
            let unit=["ลูก","โล","โล","ลูก","ลูก"];
            let qty=[9,5,8,6,7];
            let total=[];
            let sum=0;
            document.write("<table border=1><tr><th>ผลไม้</th><th>ราคา</th><th>จำนวน</th><th>รวม</th></tr>");
            for(i=0;i<5;i++){
                total[i]=price[i]*qty[i];
                sum+=total[i];
                document.write("<tr><td><img src='fruit/",i,".jpg' width=100></td><td>",price[i],"</td><td>",qty[i],"</td><td>",total[i],"</td><tr>");
            }
            document.write("</table>");
            document.write("รวมทั้งหมด ",sum,"บาท");
        </script>
    </body>    
</html>
